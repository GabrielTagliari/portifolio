const { useState, useEffect, useRef } = React;

// ─── GRAPH CANVAS ────────────────────────────────────────────────────────────
function GraphCanvas({ accent, density }) {
  const GRAPH_COLOR = '#a1e326';
  const canvasRef = useRef(null);
  const stateRef = useRef({ nodes: [], mouse: { x: -9999, y: -9999 }, raf: null, w: 0, h: 0 });

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const S = stateRef.current;

    function resize() {
      S.w = canvas.width = window.innerWidth;
      S.h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COUNT = density;
    S.nodes = Array.from({ length: COUNT }, () => ({
      x: Math.random() * S.w,
      y: Math.random() * S.h,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25,
      r: Math.random() * 2.5 + 1,
      pulse: Math.random() * Math.PI * 2,
      bright: Math.random() > 0.85
    }));

    const onMove = (e) => { S.mouse.x = e.clientX; S.mouse.y = e.clientY; };
    window.addEventListener('mousemove', onMove);

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
      return `${r},${g},${b}`;
    }

    function draw() {
      ctx.clearRect(0, 0, S.w, S.h);
      const rgb = hexToRgb(GRAPH_COLOR);
      const MAX_DIST = 160;

      S.nodes.forEach((n) => {
        n.x += n.vx; n.y += n.vy;
        if (n.x < -20) n.x = S.w + 20;
        if (n.x > S.w + 20) n.x = -20;
        if (n.y < -20) n.y = S.h + 20;
        if (n.y > S.h + 20) n.y = -20;
        n.pulse += 0.018;
      });

      for (let i = 0; i < S.nodes.length; i++) {
        for (let j = i + 1; j < S.nodes.length; j++) {
          const a = S.nodes[i], b = S.nodes[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < MAX_DIST) {
            const alpha = (1 - d / MAX_DIST) * 0.15;
            ctx.beginPath();
            ctx.strokeStyle = `rgba(${rgb},${alpha})`;
            ctx.lineWidth = 0.6;
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      S.nodes.forEach((n) => {
        const dx = n.x - S.mouse.x, dy = n.y - S.mouse.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 120) {
          const alpha = (1 - d / 120) * 0.5;
          ctx.beginPath();
          ctx.strokeStyle = `rgba(${rgb},${alpha})`;
          ctx.lineWidth = 0.8;
          ctx.moveTo(n.x, n.y);
          ctx.lineTo(S.mouse.x, S.mouse.y);
          ctx.stroke();
        }
      });

      S.nodes.forEach((n) => {
        const pulse = 0.5 + 0.5 * Math.sin(n.pulse);
        const baseAlpha = n.bright ? 0.7 + pulse * 0.3 : 0.2 + pulse * 0.15;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${rgb},${baseAlpha})`;
        ctx.fill();
        if (n.bright) {
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r * 3, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${rgb},${pulse * 0.06})`;
          ctx.fill();
        }
      });

      S.raf = requestAnimationFrame(draw);
    }
    draw();

    return () => {
      cancelAnimationFrame(S.raf);
      window.removeEventListener('resize', resize);
      window.removeEventListener('mousemove', onMove);
    };
  }, [accent, density]);

  return <canvas ref={canvasRef} style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none', zIndex: 0, opacity: 1 }} />;
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function Nav({ accent }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      padding: '20px 48px',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      background: scrolled ? 'rgba(7,7,10,0.9)' : 'transparent',
      backdropFilter: scrolled ? 'blur(16px)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(30,30,46,0.8)' : '1px solid transparent',
      transition: 'all 0.4s ease'
    }}>
      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 13, color: accent, letterSpacing: '0.08em' }}>GTR</span>
      <div style={{ display: 'flex', gap: 32 }}>
        {[['Builder', 'about'], ['Work', 'projects']].map(([label, anchor]) =>
          <a key={label} href={`#${anchor}`} style={{
            fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--muted)',
            letterSpacing: '0.1em', textTransform: 'uppercase',
            transition: 'color 0.2s'
          }}
          onMouseEnter={(e) => e.target.style.color = accent}
          onMouseLeave={(e) => e.target.style.color = 'var(--muted)'}>
            {label}
          </a>
        )}
      </div>
    </nav>
  );
}

// ─── SECTION REVEAL HOOK ─────────────────────────────────────────────────────
function useReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold: 0.1 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

              </div>

              <div style={{ marginBottom: 40 }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: accent, letterSpacing: '0.15em', display: 'block', marginBottom: 12 }}>PROBLEM</span>
                <p style={{ fontSize: 16, lineHeight: 1.7, color: 'var(--muted)', maxWidth: 680 }}>{project.problem}</p>
              </div>

              <div style={{ marginBottom: 40, padding: '24px 28px', background: 'rgba(161,227,38,0.06)', border: '1px solid rgba(161,227,38,0.25)', borderRadius: 4 }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: '#a1e326', letterSpacing: '0.15em', display: 'block', marginBottom: 12 }}>SHIPPED → IMPACTO</span>
                <p style={{ fontSize: 15, lineHeight: 1.7, color: 'var(--text)' }}>{project.ship}</p>
              </div>

              <div style={{ marginBottom: 40 }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: accent, letterSpacing: '0.15em', display: 'block', marginBottom: 20 }}>ARQUITETURA</span>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 12 }}>
                  {project.architecture.map((a, i) =>
                    <ArchNode key={i} node={a} accent={accent} />
                  )}
                </div>
              </div>

              <div style={{ marginBottom: 36 }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: accent, letterSpacing: '0.15em', display: 'block', marginBottom: 20 }}>DECISÕES-CHAVE</span>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {project.decisions.map((d, i) =>
                    <div key={i} style={{ padding: '20px 24px', background: 'var(--surface2)', borderRadius: 3, borderLeft: `3px solid ${accent}` }}>
                      <p style={{ fontWeight: 600, marginBottom: 8, fontSize: 15 }}>{d.title}</p>
                      <p style={{ fontSize: 14, color: 'var(--muted)', lineHeight: 1.7 }}>{d.body}</p>
                    </div>
                  )}
                </div>
              </div>

              <div>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: accent, letterSpacing: '0.15em', display: 'block', marginBottom: 14 }}>TECNOLOGIAS</span>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  {project.stack.map((s) =>
                    <span key={s} style={{
                      fontFamily: 'var(--font-mono)', fontSize: 11, padding: '5px 12px',
                      border: '1px solid var(--border)', borderRadius: 2, color: 'var(--muted)'
                    }}>{s}</span>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function ArchNode({ node, accent }) {
  const [hover, setHover] = useState(false);
  return (
    <div
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        padding: '18px 20px', border: `1px solid ${hover ? accent : 'var(--border)'}`,
        borderRadius: 3, background: hover ? 'rgba(161,227,38,0.04)' : 'var(--surface2)',
        transition: 'all 0.25s ease', cursor: 'default'
      }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
        <div style={{ width: 6, height: 6, borderRadius: '50%', background: accent, flexShrink: 0 }} />
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: accent, fontWeight: 500 }}>{node.node}</span>
      </div>
      <p style={{ fontSize: 11, color: 'var(--muted)', fontFamily: 'var(--font-mono)', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.08em' }}>{node.role}</p>
      <p style={{ fontSize: 13, color: hover ? 'var(--text)' : 'var(--muted)', lineHeight: 1.6, transition: 'color 0.25s' }}>{node.detail}</p>
    </div>
  );
}

// ─── FOOTER ──────────────────────────────────────────────────────────────────
function Footer({ accent }) {
  return (
    <footer style={{
      padding: 'clamp(48px,6vw,80px) clamp(24px,8vw,96px)',
      borderTop: '1px solid var(--border)',
      display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 24,
      position: 'relative', zIndex: 1
    }}>
      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--muted)' }}>© 2026 Gabriel Tagliari Rodrigo</span>
      <a href="https://www.linkedin.com/in/gabrieltagliari/" target="_blank" rel="noreferrer"
        style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--muted2)', letterSpacing: '0.06em', display: 'flex', alignItems: 'center', gap: 6, opacity: 0.5, transition: 'opacity 0.2s' }}
        onMouseEnter={e => e.currentTarget.style.opacity = '1'}
        onMouseLeave={e => e.currentTarget.style.opacity = '0.5'}>
        linkedin
      </a>
    </footer>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const accent = 'rgb(161, 227, 38)';

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', accent);
    document.documentElement.style.setProperty('--accent-dim', 'rgba(161,227,38,0.12)');
    document.documentElement.style.setProperty('--accent-glow', 'rgba(161,227,38,0.35)');
  }, []);

  return (
    <>
      <GraphCanvas accent={accent} density={87} />
      <Nav accent={accent} />
      <Hero accent={accent} />
      <About accent={accent} />
      <Projects accent={accent} />
      <Footer accent={accent} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
