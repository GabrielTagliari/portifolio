// ─── GRAPH CANVAS ────────────────────────────────────────────────────────────
function GraphCanvas({ accent, density }) {
  const GRAPH_COLOR = '#a1e326';
  const canvasRef = useRef(null);
  const stateRef = useRef({ nodes: [], mouse: { x: -9999, y: -9999 }, raf: null, w: 0, h: 0 });

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const S = stateRef.current;

    function resize() {
      S.w = canvas.width = window.innerWidth;
      S.h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COUNT = density;
    S.nodes = Array.from({ length: COUNT }, () => ({
      x: Math.random() * S.w,
      y: Math.random() * S.h,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25,
      r: Math.random() * 2.5 + 1,
      pulse: Math.random() * Math.PI * 2,
      bright: Math.random() > 0.85
    }));

    const onMove = (e) => {
      S.mouse.x = e.clientX;S.mouse.y = e.clientY;
    };
    window.addEventListener('mousemove', onMove);

    // Parse accent to rgb
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16),g = parseInt(hex.slice(3, 5), 16),b = parseInt(hex.slice(5, 7), 16);
      return `${r},${g},${b}`;
    }

    function draw() {
      ctx.clearRect(0, 0, S.w, S.h);
      const rgb = hexToRgb(GRAPH_COLOR);
      const MAX_DIST = 160;
      const now = Date.now() / 1000;

      S.nodes.forEach((n) => {
        n.x += n.vx;n.y += n.vy;
        if (n.x < -20) n.x = S.w + 20;
        if (n.x > S.w + 20) n.x = -20;
        if (n.y < -20) n.y = S.h + 20;
        if (n.y > S.h + 20) n.y = -20;
        n.pulse += 0.018;
      });

      // Draw edges
      for (let i = 0; i < S.nodes.length; i++) {
        for (let j = i + 1; j < S.nodes.length; j++) {
          const a = S.nodes[i],b = S.nodes[j];
          const dx = a.x - b.x,dy = a.y - b.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < MAX_DIST) {
            const alpha = (1 - d / MAX_DIST) * 0.15;
            ctx.beginPath();
            ctx.strokeStyle = `rgba(${rgb},${alpha})`;
            ctx.lineWidth = 0.6;
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      // Mouse proximity edges
      S.nodes.forEach((n) => {
        const dx = n.x - S.mouse.x,dy = n.y - S.mouse.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 120) {
          const alpha = (1 - d / 120) * 0.5;
          ctx.beginPath();
          ctx.strokeStyle = `rgba(${rgb},${alpha})`;
          ctx.lineWidth = 0.8;
          ctx.moveTo(n.x, n.y);
          ctx.lineTo(S.mouse.x, S.mouse.y);
          ctx.stroke();
        }
      });

      // Draw nodes
      S.nodes.forEach((n) => {
        const pulse = 0.5 + 0.5 * Math.sin(n.pulse);
        const baseAlpha = n.bright ? 0.7 + pulse * 0.3 : 0.2 + pulse * 0.15;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${rgb},${baseAlpha})`;
        ctx.fill();
        if (n.bright) {
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r * 3, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${rgb},${pulse * 0.06})`;
          ctx.fill();
        }
      });

      S.raf = requestAnimationFrame(draw);
    }
    draw();

    return () => {
      cancelAnimationFrame(S.raf);
      window.removeEventListener('resize', resize);
      window.removeEventListener('mousemove', onMove);
    };
  }, [accent, density]);

  return <canvas ref={canvasRef} style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none', zIndex: 0, opacity: 1 }} />;
}

// ─── SECTION REVEAL HOOK ─────────────────────────────────────────────────────
function useReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {if (e.isIntersecting) setVisible(true);}, { threshold: 0.1 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

// ─── TWEAKS ──────────────────────────────────────────────────────────────────
const ACCENT_VARIANTS = [
{ label: 'Amber', color: '#f97316' },
{ label: 'Violet', color: '#a78bfa' },
{ label: 'Cyan', color: '#22d3ee' },
{ label: 'Verde', color: 'rgb(21, 61, 59)' },

function TweaksPanel({ tweaks, setTweaks, visible, onClose }) {
  if (!visible) return null;
  return (
    <div style={{
      position: 'fixed', bottom: 100, right: 32, zIndex: 300,
      background: 'var(--surface)', border: '1px solid var(--border)',
      borderRadius: 6, padding: 24, width: 260,
      boxShadow: '0 20px 60px rgba(0,0,0,0.6)'
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 20 }}>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: tweaks.accentColor, letterSpacing: '0.1em' }}>TWEAKS</span>
        <button onClick={onClose} style={{ background: 'none', border: 'none', color: 'var(--muted)', cursor: 'pointer', fontSize: 16 }}>×</button>
      </div>

      <div style={{ marginBottom: 20 }}>
        <p style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)', marginBottom: 10, letterSpacing: '0.1em' }}>COR DE DESTAQUE</p>
        <div style={{ display: 'flex', gap: 8 }}>
          {ACCENT_VARIANTS.map((v) =>
          <button key={v.label} onClick={() => {
            setTweaks((t) => ({ ...t, accentColor: v.color, accentLabel: v.label }));
            window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: v.color, accentLabel: v.label } }, '*');
          }} style={{
            width: 36, height: 36, borderRadius: '50%', background: v.color, border: 'none', cursor: 'pointer',
            outline: tweaks.accentColor === v.color ? `2px solid ${v.color}` : '2px solid transparent',
            outlineOffset: 3, transition: 'outline 0.2s'
          }} title={v.label} />
          )}
        </div>
      </div>

      <div style={{ marginBottom: 20 }}>
        <p style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)', marginBottom: 10, letterSpacing: '0.1em' }}>DENSIDADE DO GRAFO</p>
        <input type="range" min={20} max={100} value={tweaks.graphDensity}
        onChange={(e) => {
          const v = parseInt(e.target.value);
          setTweaks((t) => ({ ...t, graphDensity: v }));
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { graphDensity: v } }, '*');
        }}
        style={{ width: '100%', accentColor: tweaks.accentColor }} />
        
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)' }}>{tweaks.graphDensity} nós</span>

          setTweaks((t) => ({ ...t, showBlogDates: !t.showBlogDates }));
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { showBlogDates: !tweaks.showBlogDates } }, '*');
        }} style={{
          fontFamily: 'var(--font-mono)', fontSize: 11, padding: '6px 14px',
          border: `1px solid ${tweaks.showBlogDates ? tweaks.accentColor : 'var(--border)'}`,
          background: tweaks.showBlogDates ? 'rgba(249,115,22,0.08)' : 'transparent',
          color: tweaks.showBlogDates ? tweaks.accentColor : 'var(--muted)',
          borderRadius: 2, cursor: 'pointer'
        }}>{tweaks.showBlogDates ? 'Visível' : 'Oculto'}</button>
      </div>
    </div>);

}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const accent = tweaks.accentColor;

  // CSS variable sync
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', accent);
    document.documentElement.style.setProperty('--accent-dim', accent + '20');
    document.documentElement.style.setProperty('--accent-glow', accent + '55');
  }, [accent]);

  // Tweaks toggle from parent
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  return (
    <>
      <GraphCanvas accent={accent} density={tweaks.graphDensity} />
      <Nav accent={accent} />
      <Hero accent={accent} />
      <About accent={accent} />
      <Projects accent={accent} />
      <Footer accent={accent} />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksOpen} onClose={() => setTweaksOpen(false)} />
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
